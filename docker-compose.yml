version: "3.8"

services:
  # api gateway service
  api-gateway:
  image: nginx:alpine
  ports:
    - "8000:80"
  volumes:
    - ./gateway/nginx.conf:/etc/nginx/nginx.conf
  depend_on:
    - mysql-db
    - postgres-db

  # db java
  mysql-db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: elearning_core

  # db python
  postgres-db:
    image: postgres:13
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: elearning_ai

  # cache c#
  redis-cache:
    image: redis:alpine
    ports:
      - "6379:6379"

  # message queue
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
